{% extends 'app/base.html' %}
{% load static %}
{% block title %}Password Reset Complete{% endblock title %}

{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-lg border-0 border-success border-3">
                <div class="card-body p-5 text-center">
                    
                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-6x text-success"></i>
                    </div>

                    <h3 class="mb-3 fw-bold text-success">Password Reset Complete!</h3>
                    
                    <p class="lead text-muted">
                        Your password has been successfully reset. You can now use your new password to log in.
                    </p>

                    <div class="d-grid mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i> Log In Now
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
