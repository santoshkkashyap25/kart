{% extends 'app/base.html' %}
{% load static %}
{% block title %}Email Sent!{% endblock title %}

{% block main-content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-lg border-0 border-info border-3">
                <div class="card-body p-5 text-center">
                    
                    <div class="mb-4">
                        <i class="fas fa-envelope-open-text fa-6x text-info"></i>
                    </div>

                    <h3 class="mb-3 fw-bold text-info">Email Sent Successfully!</h3>
                    
                    <p class="lead text-muted">
                        We've sent an email with instructions to reset your password.
                    </p>
                    
                    <p class="fs-5 fw-bold text-dark mt-4">
                        <i class="fas fa-inbox me-2"></i> Please check your inbox (and spam folder).
                    </p>

                    <div class="d-grid mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg fw-bold">
                            Back to Login
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main-content %}
